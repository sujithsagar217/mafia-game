<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mafia Game</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/player.css') }}">
</head>
<body>

<h2>Mafia Game</h2>

<div class="card">
    <input id="name" placeholder="Enter your name">
    <button id="joinBtn" type="button">Join</button>
</div>

<div id="waitingBox"></div>
<div id="deadBanner"></div>

<div class="card">
    <h3 id="role"></h3>
    <h3 id="mafiaTeam" class="mafia-team"></h3>
    <h3 id="round"></h3>
    <h3 id="phase"></h3>
    <h2 id="winner" class="winner-text"></h2>
</div>

<div id="actionBox" class="card"></div>
<div id="suggestBox" class="card"></div>
<div id="voteBox" class="card"></div>

<div class="card">
    <h3>Police Reports</h3>
    <ul id="reports"></ul>
</div>

<div class="card">
    <h3>Alive</h3>
    <ul id="alive"></ul>
</div>

<div class="card">
    <h3>Dead</h3>
    <ul id="dead"></ul>
</div>

<script src="{{ url_for('static', filename='js/player.js') }}"></script>
</body>
</html>
