<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Host Control Panel</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/host.css') }}">
</head>
<body>

<main class="page">
    <section class="panel hero">
        <h2>Host Control Panel</h2>
        <p class="subtitle">Manage rounds, voting, and game resets from one place.</p>
        <div class="actions-grid">
            <button id="startBtn" type="button">Start Game</button>
            <button id="resolveBtn" type="button">Resolve Night</button>
            <button id="startVoteBtn" type="button">Start Voting</button>
            <button id="endVoteBtn" type="button">End Voting</button>
            <button id="nextBtn" type="button">Next Round</button>
            <button id="endGameBtn" type="button" class="danger">End Game</button>
        </div>
        <h3 id="status"></h3>
        <h3 id="gameInfo"></h3>
        <h2 id="winner" class="winner-text"></h2>
    </section>

    <section class="panel">
        <h3>Players</h3>
        <ul id="players"></ul>
    </section>

    <section class="panel">
        <h3>Roles</h3>
        <ul id="roles"></ul>
    </section>

    <section class="panel">
        <h3>Night Actions</h3>
        <ul id="actions"></ul>
    </section>

    <section class="panel">
        <h3>Mafia Suggestions</h3>
        <ul id="suggestions"></ul>
    </section>

    <section class="panel">
        <h3>Live Votes</h3>
        <ul id="voteCounts"></ul>
    </section>

    <section class="panel">
        <h3>Who Voted Whom</h3>
        <ul id="voteDetails"></ul>
    </section>

    <section class="panel">
        <h3>Vote History</h3>
        <ul id="voteHistory"></ul>
    </section>
</main>

<script src="{{ url_for('static', filename='js/host.js') }}"></script>
</body>
</html>
